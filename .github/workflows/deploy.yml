name: Deploy

# Deploys to Azure App Service via OIDC (federated credentials) — no stored secrets.
# Configure these repository VARIABLES (Settings → Secrets and variables → Actions → Variables):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, AZURE_WEBAPP_NAME
# (These are identifiers, not secrets. OIDC means no client secret is ever stored.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC login to Azure
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - name: Fold frontend build into the API wwwroot
        run: |
          rm -rf backend/src/Skuttoo.Api/wwwroot
          mkdir -p backend/src/Skuttoo.Api/wwwroot
          cp -r frontend/dist/* backend/src/Skuttoo.Api/wwwroot/

      - name: Publish backend
        run: dotnet publish backend/src/Skuttoo.Api/Skuttoo.Api.csproj -c Release -o ./publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ./publish
